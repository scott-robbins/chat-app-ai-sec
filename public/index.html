<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jolene AI</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --primary: #f6821f; --bg: #0f172a; --text: #f8fafc; --card: rgba(30, 41, 59, 0.7); }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .chat-container { width: 100%; max-width: 800px; height: 70vh; background: var(--card); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px 16px; border-radius: 12px; max-width: 80%; }
        .user-message { background: var(--primary); align-self: flex-end; }
        .assistant-message { background: rgba(255,255,255,0.05); align-self: flex-start; }
        .input-area { display: flex; padding: 20px; gap: 10px; background: rgba(0,0,0,0.2); }
        textarea { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px; resize: none; }
        button { background: var(--primary); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #typing-indicator { display: none; color: var(--primary); font-size: 0.8rem; margin-bottom: 10px; }
        #typing-indicator.visible { display: block; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; }
        .btn-sec { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 6px; color: white; cursor: pointer; border: none; }
    </style>
</head>
<body>
    <h1>Jolene</h1>
    <div class="controls">
        <button id="clear-screen-btn" class="btn-sec">Clear</button>
        <button id="new-chat-btn" class="btn-sec" style="background: var(--primary);">New Chat</button>
    </div>
    <div class="chat-container">
        <div id="chat-messages"></div>
        <div id="typing-indicator">Jolene is thinking...</div>
        <div class="input-area">
            <textarea id="user-input" placeholder="Ask Jolene..."></textarea>
            <button id="send-button">Send</button>
        </div>
    </div>
    <script src="chat.js"></script>
</body>
</html>
