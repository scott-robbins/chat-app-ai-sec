<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Jolene AI</title>
		
		<script src="https://unpkg.com/@phosphor-icons/web"></script>
		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
		<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
		<link rel="stylesheet" href="style.css">

		<style>
            /* --- RESTORING JOLENE CORE THEME --- */
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--primary-light: rgba(246, 130, 31, 0.1);
				--light-bg: #f4f6f8;
				--app-bg: #ffffff;
				--border-color: #e2e8f0;
				--text-color: #1e293b;
				--text-color-dark: #0f172a;
				--text-light: #64748b;
				--user-msg-bg: #f6821f;
				--user-msg-text: #ffffff;
				--assistant-msg-bg: #ffffff;
				--body-bg: linear-gradient(135deg, #fffaf5 0%, #f4f6f8 100%);
			}

			body.theme-fancy {
				--app-bg: rgba(30, 41, 59, 0.8);
				--light-bg: rgba(15, 23, 42, 0.3);
				--border-color: rgba(255, 255, 255, 0.1);
				--text-color: #f8fafc;
				--text-light: #cbd5e1;
				--assistant-msg-bg: rgba(30, 41, 59, 0.6);
				--body-bg: #0f172a;
			}

            body {
				font-family: -apple-system, system-ui, sans-serif;
				color: var(--text-color);
				background: var(--body-bg);
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 1rem;
				transition: background 0.5s ease;
				overflow-x: hidden;
			}

            /* Restoring Lava Lamp */
			.lava-lamp-container {
				position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
				z-index: -1; overflow: hidden; display: none;
			}
			body.theme-fancy .lava-lamp-container { display: block; }
			.blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: float 15s infinite alternate ease-in-out; }
			.blob1 { width: 400px; height: 400px; background: #f6821f; top: -100px; left: -100px; }
			.blob2 { width: 500px; height: 500px; background: #d95d14; bottom: -150px; right: -100px; }
			.blob3 { width: 300px; height: 300px; background: #faad3f; top: 40%; left: 30%; }

            @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(100px, -50px) scale(1.1); } }

            /* New Clean Header with Presence */
			header {
				display: flex; justify-content: space-between; align-items: center;
				padding: 1rem 0; width: 100%; max-width: 800px; margin-bottom: 1.5rem;
			}

			.brand-container { position: relative; cursor: pointer; text-align: left; }
			.brand-container h1 { font-size: 1.8rem; color: #fff; margin: 0; text-shadow: 0 2px 10px rgba(246, 130, 31, 0.5); }
			
			.dropdown-menu {
				position: absolute; top: 110%; left: 0; background: #1e293b;
				border: 1px solid var(--border-color); border-radius: 12px;
				min-width: 220px; display: none; flex-direction: column;
				box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 3000; overflow: hidden;
                backdrop-filter: blur(10px);
			}
			.dropdown-menu.show { display: flex; }
			.menu-item {
				padding: 14px 18px; color: #fff; display: flex; align-items: center; gap: 12px; transition: 0.2s; font-size: 0.9rem;
			}
			.menu-item:hover { background: var(--primary-color); }

			.icon-actions { display: flex; gap: 15px; }
			.icon-btn { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; transition: 0.2s; opacity: 0.8; }
			.icon-btn:hover { opacity: 1; transform: scale(1.1); color: var(--primary-color); }

            /* Chat Window Restored */
            .chat-container {
				display: flex; flex-direction: column; width: 100%; max-width: 800px;
				height: calc(100vh - 200px); min-height: 500px; background-color: var(--app-bg);
				border-radius: 20px; overflow: hidden; border: 1px solid var(--border-color);
				backdrop-filter: blur(16px);
                box-shadow: 0 20px 50px rgba(0,0,0,0.3);
			}

			#chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; background-color: var(--light-bg); display: flex; flex-direction: column; gap: 1rem; }

            /* Messaging Bar Cleanup */
			.input-wrapper {
				display: flex; align-items: center; gap: 12px; width: 100%;
				background: rgba(15, 23, 42, 0.5); border-radius: 28px; padding: 10px 20px;
				border: 1px solid var(--border-color);
			}
			#user-input { background: transparent; border: none; outline: none; color: white; flex: 1; font-family: inherit; resize: none; }
		</style>
	</head>
	<body class="theme-fancy">
		<div class="lava-lamp-container">
			<div class="blob blob1"></div>
			<div class="blob blob2"></div>
			<div class="blob blob3"></div>
		</div>

		<header>
			<div class="brand-container" onclick="toggleMenu()">
				<h1>Jolene <i class="ph ph-caret-down" style="font-size: 0.9rem; opacity: 0.6;"></i></h1>
				<div id="app-menu" class="dropdown-menu">
					<div class="menu-item" onclick="toggleSidebar()"><i class="ph ph-database"></i> Memory Sidebar</div>
					<div class="menu-item" onclick="toggleTheme()"><i class="ph ph-magic-wand"></i> Switch Theme</div>
					<div class="menu-item" onclick="toggleHelp()"><i class="ph ph-question"></i> Tips & Help</div>
                    <div class="menu-item" style="border-top: 1px solid rgba(255,255,255,0.1)">
						<select id="model-selector" style="background:transparent; border:none; color:inherit; font-size:inherit; width:100%; cursor:pointer;">
							<option value="@cf/meta/llama-3.2-11b-vision-instruct">Llama 3.2 Vision</option>
							<option value="@cf/meta/llama-3.1-8b-instruct">Llama 3.1 (8B)</option>
						</select>
					</div>
				</div>
			</div>

			<div class="icon-actions">
				<button class="icon-btn" onclick="clearScreen()" title="Clear Screen"><i class="ph ph-trash"></i></button>
				<button class="icon-btn" onclick="newChat()" title="New Chat" style="color: var(--primary-color);"><i class="ph ph-plus-circle"></i></button>
			</div>
		</header>

		<div class="chat-container">
			<div id="chat-messages">
				<div class="message assistant-message">
					<div class="message-content">
						<p>Hi there! I'm Jolene. How can I help you today?</p>
					</div>
				</div>
			</div>

            <div id="typing-indicator" class="message assistant-message">
				<div class="typing-dots"><span></span><span></span><span></span></div>
			</div>

			<div class="message-input" style="padding: 1.5rem; background: transparent;">
				<div class="input-wrapper">
					<label for="file-input" class="icon-btn" title="Upload File" style="font-size: 1.2rem;">
						<i class="ph ph-paperclip"></i>
					</label>
					<input type="file" id="file-input" style="display:none;" onchange="handleFileSelect()">
					
					<textarea id="user-input" placeholder="Message Jolene..." rows="1"></textarea>
					
					<button id="send-button" class="icon-btn" style="color: var(--primary-color);">
						<i class="ph-fill ph-paper-plane-right"></i>
					</button>
				</div>
				<div id="file-status" style="font-size: 0.75rem; color: var(--primary-color); margin-top: 8px; margin-left: 20px; display: none; font-weight: 600;"></div>
			</div>
		</div>

        <div id="memory-sidebar" class="sidebar">
            <div class="sidebar-header">
                <h2>Jolene's Memory</h2>
                <button id="close-sidebar-btn" onclick="toggleSidebar()"><i class="ph ph-x"></i></button>
            </div>
            <div class="sidebar-content">
                <section>
                    <h3><i class="ph ph-user-focus"></i> Profile (KV)</h3>
                    <div id="kv-profile-display" class="memory-card">Loading profile...</div>
                </section>
                <section style="margin-top: 30px;">
                    <h3><i class="ph ph-files"></i> Memorized Files (R2)</h3>
                    <ul id="file-list-display" class="file-list"></ul>
                </section>
            </div>
            <button id="clear-vector-btn" class="btn-danger"><i class="ph ph-warning"></i> Wipe All Knowledge</button>
        </div>

        <div id="helpModal" class="modal-overlay">
			<div class="modal-content">
				<div class="sidebar-header" style="margin-bottom: 20px;">
					<h2>Tips & Tricks</h2>
					<button onclick="toggleHelp()" style="background:none; border:none; color:var(--text-light); font-size: 1.5rem; cursor:pointer;">&times;</button>
				</div>
				<div class="modal-body">
					<div class="tip-section">
						<h4><i class="ph ph-brain"></i> Memory</h4>
						<p>Save facts: <code>Save to my profile: [Fact]</code></p>
					</div>
					<div class="tip-section">
						<h4><i class="ph ph-paint-brush"></i> Art</h4>
						<p>Ask her to <em>"Generate an image..."</em></p>
					</div>
				</div>
				<button class="btn-primary" style="width:100%; justify-content:center; padding:12px; border-radius: 8px;" onclick="toggleHelp()">Got it!</button>
			</div>
		</div>

		<script src="chat.js"></script>
		<script>
			function toggleMenu() { document.getElementById('app-menu').classList.toggle('show'); }
			window.addEventListener('click', function(e) {
				if (!document.querySelector('.brand-container').contains(e.target)) {
					document.getElementById('app-menu').classList.remove('show');
				}
			});
		</script>
	</body>
</html>
