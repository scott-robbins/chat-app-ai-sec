<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Jolene AI</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --primary-color: #f6821f; --body-bg: #0f172a; --app-bg: rgba(30, 41, 59, 0.7); --text-color: #f8fafc; }
        body.theme-plain { --body-bg: #f8fafc; --app-bg: #ffffff; --text-color: #1e293b; }
        body { font-family: sans-serif; background: var(--body-bg); color: var(--text-color); display: flex; flex-direction: column; align-items: center; padding: 2rem; transition: 0.3s; }
        .lava-lamp-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5; animation: float 15s infinite alternate; }
        .blob1 { width: 400px; height: 400px; background: #f6821f; top: -100px; left: -100px; }
        @keyframes float { 100% { transform: translate(100px, -50px); } }
        header h1 { font-size: 2.5rem; text-shadow: 0 0 20px #f6821f; color: #fff; }
        .chat-container { width: 100%; max-width: 800px; height: 500px; background: var(--app-bg); border-radius: 24px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 10px; }
        .dropdown { position: relative; }
        .dropdown-content { display: none; position: absolute; right: 0; background: #1e293b; min-width: 200px; border-radius: 12px; border: 1px solid #444; }
        .dropdown-content.show { display: block; }
        .dropdown-item { padding: 12px; cursor: pointer; color: white; display: flex; gap: 10px; }
        .dropdown-item:hover { background: #f6821f; }
    </style>
</head>
<body class="theme-fancy">
    <div class="lava-lamp-container"><div class="blob blob1"></div></div>
    <header>
        <h1>Jolene</h1>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="clearScreen()">Clear</button>
            <button onclick="newChat()">New Chat</button>
            <div class="dropdown">
                <button onclick="toggleSettings()">Settings</button>
                <div id="settings-dropdown" class="dropdown-content">
                    <div class="dropdown-item" onclick="toggleTheme()">Switch Theme</div>
                    <div class="dropdown-item" onclick="openSidebar()">Memory Sidebar</div>
                    <div class="dropdown-item" onclick="openHelp()">Help Tips</div>
                </div>
            </div>
        </div>
    </header>
    <div class="chat-container">
        <div id="chat-messages">
            <div class="message assistant-message"><p>Hi there! I'm Jolene. How can I help you today?</p></div>
        </div>
        <div style="padding:20px; background:rgba(0,0,0,0.2);">
            <textarea id="user-input" style="width:100%; background:transparent; color:white; border:1px solid #444; padding:10px; border-radius:8px;"></textarea>
            <button onclick="sendMessage()" style="background:#f6821f; color:white; border:none; padding:10px 20px; border-radius:8px; margin-top:10px; cursor:pointer;">Send</button>
        </div>
    </div>
    <script src="chat.js"></script>
</body>
</html>
