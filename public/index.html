<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jolene AI | Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #1a1a1a;
            --panel-bg: #2a2a2a;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* Sidebar / Command Center Styles */
        #command-center {
            width: 300px;
            background: var(--panel-bg);
            border-right: 1px solid var(--gold);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        h2, h3 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-top: 0;
        }

        .stat-box {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid var(--gold);
        }

        .stat-box label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: #888;
        }

        .stat-box p, .stat-box ul {
            margin: 0;
            font-size: 0.9rem;
        }

        #knowledge-assets {
            list-style: none;
            padding: 0;
            max-height: 150px;
            overflow-y: auto;
        }

        #knowledge-assets li {
            padding: 5px 0;
            border-bottom: 1px solid #333;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Main Chat Area */
        #chat-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #messages {
            flex-grow: 1;
            overflow-y: auto;
            padding-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 15px;
            line-height: 1.5;
        }

        .user { align-self: flex-end; background: #3d3d3d; border-bottom-right-radius: 2px; }
        .assistant { align-self: flex-start; background: #2c3e50; border-bottom-left-radius: 2px; border: 1px solid var(--gold); }

        /* Input Area */
        #input-area {
            display: flex;
            gap: 10px;
            padding: 20px 0;
        }

        input[type="text"] {
            flex-grow: 1;
            background: #333;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            border-radius: 5px;
        }

        button {
            background: var(--gold);
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <aside id="command-center">
        <h2>Jolene v2</h2>
        
        <div class="stat-box">
            <label>Identity Profile</label>
            <p id="profile-text">Standard Agent Profile</p>
        </div>

        <div class="stat-box">
            <label>Message Volume</label>
            <p id="message-count">0</p>
        </div>

        <div class="stat-box">
            <label>Knowledge Assets (R2)</label>
            <ul id="knowledge-assets">
                <li>No assets loaded</li>
            </ul>
        </div>

        <div class="stat-box">
            <label>System Status</label>
            <p id="sys-status" style="color: #00ff00;">● Online</p>
        </div>
    </aside>

    <main id="chat-container">
        <div id="messages"></div>
        
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Ask Jolene anything...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </main>

    <script>
        const sessionId = "global"; // Using global for dashboard sync

        async function updateProfile() {
            try {
                const res = await fetch('/api/profile', { headers: { 'x-session-id': sessionId } });
                const data = await res.json();
                
                document.getElementById('profile-text').innerText = data.profile;
                document.getElementById('message-count').innerText = data.messageCount;
                
                const list = document.getElementById('knowledge-assets');
                list.innerHTML = '';
                if (data.knowledgeAssets && data.knowledgeAssets.length > 0) {
                    data.knowledgeAssets.forEach(file => {
                        const li = document.createElement('li');
                        li.innerText = "📄 " + file;
                        list.appendChild(li);
                    });
                } else {
                    list.innerHTML = '<li>No assets loaded</li>';
                }
            } catch (e) {
                console.error("Dashboard sync error:", e);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const content = input.value.trim();
            if (!content) return;

            // Add user message to UI
            addMessage('user', content);
            input.value = '';

            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-session-id': sessionId },
                body: JSON.stringify({ messages: [{ role: 'user', content }] })
            });

            // Handle Streamed Response
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let assistantMsg = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.substring(6));
                            if (data.response) assistantMsg = data.response;
                        } catch (e) {}
                    }
                }
            }
            addMessage('assistant', assistantMsg);
            updateProfile(); // Sync dashboard after chat
        }

        function addMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.innerText = text;
            document.getElementById('messages').appendChild(msgDiv);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        // Initial Load
        updateProfile();
        // Refresh dashboard every 30 seconds
        setInterval(updateProfile, 30000);
    </script>
</body>
</html>
