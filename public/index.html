<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jolene AI</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --primary: #f6821f;
            --glass-bg: rgba(30, 41, 59, 0.5); /* Semi-transparent dark */
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-color: #f8fafc;
        }

        body.theme-plain {
            --glass-bg: rgba(255, 255, 255, 0.8);
            --text-color: #1e293b;
            --glass-border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: #0f172a; /* Deep dark base */
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            overflow-x: hidden;
        }

        /* --- LAVA LAMP (Z-Index -1 keeps it behind everything) --- */
        .lava-lamp-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
        }
        .blob {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6;
            animation: float 15s infinite alternate ease-in-out;
        }
        .blob1 { width: 450px; height: 450px; background: var(--primary); top: -100px; left: -100px; }
        .blob2 { width: 550px; height: 550px; background: #d95d14; bottom: -150px; right: -100px; }
        @keyframes float { 100% { transform: translate(120px, -60px) scale(1.1); } }

        header { text-align: center; margin-bottom: 2rem; width: 100%; max-width: 800px; }
        h1 { font-size: 3rem; color: #fff; text-shadow: 0 0 20px rgba(246, 130, 31, 0.6); }

        .controls-row { display: flex; justify-content: center; gap: 10px; margin-top: 1.5rem; flex-wrap: wrap; }
        
        button, select {
            padding: 10px 18px; border-radius: 12px; border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1); color: white; cursor: pointer;
            font-weight: 600; display: flex; align-items: center; gap: 8px;
            backdrop-filter: blur(10px);
        }
        .btn-primary { background: var(--primary); border: none; }

        /* --- THE CHAT GLASS BOX --- */
        .chat-container {
            width: 100%; max-width: 850px; height: calc(100vh - 350px);
            background: var(--glass-bg); /* Transparency */
            border-radius: 28px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px); /* Frosting effect */
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; overflow: hidden;
        }

        #chat-messages { flex: 1; overflow-y: auto; padding: 2.5rem; display: flex; flex-direction: column; gap: 1rem; }

        .message-input {
            padding: 1.5rem; background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid var(--glass-border);
        }

        textarea {
            width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05); color: white; outline: none; resize: none;
        }

        footer { margin-top: 2rem; color: #64748b; font-size: 0.9rem; }
    </style>
</head>
<body class="theme-fancy">
    <div class="lava-lamp-container">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
    </div>

    <header>
        <h1>Jolene</h1>
        <div class="controls-row">
            <button onclick="clearScreen()"><i class="ph ph-trash"></i> Clear</button>
            <button class="btn-primary" onclick="newChat()"><i class="ph ph-plus"></i> New Chat</button>
            <button onclick="toggleTheme()"><i class="ph ph-magic-wand"></i> Theme</button>
            <button onclick="openSidebar()"><i class="ph ph-database"></i> Memory</button>
            <button onclick="openHelp()"><i class="ph ph-question"></i> Help</button>
            <select id="model-selector">
                <option value="@cf/meta/llama-3.2-11b-vision-instruct">Llama 3.2 Vision</option>
                <option value="@cf/mistral/mistral-7b-instruct-v0.1">Mistral 7B</option>
                <option value="@cf/google/gemma-7b-it">Gemma 7B</option>
            </select>
        </div>
    </header>

    <div class="chat-container">
        <div id="chat-messages">
            <div class="message"><p>Hi there! I'm Jolene. Ready to get back to work?</p></div>
        </div>
        <div class="message-input">
            <div style="display:flex; gap:12px;">
                <textarea id="user-input" placeholder="Message Jolene..." rows="1"></textarea>
                <button onclick="sendMessage()" class="btn-primary" style="border-radius:50%; width:48px; height:48px; justify-content:center;"><i class="ph-fill ph-paper-plane-right"></i></button>
            </div>
        </div>
    </div>

    <footer>Jolene AI &copy; 2026</footer>
    <script src="chat.js"></script>
</body>
</html>
