<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Jolene AI</title>
		
		<script src="https://unpkg.com/@phosphor-icons/web"></script>
		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
		<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
		<link rel="stylesheet" href="style.css">

		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--app-bg: #ffffff;
				--border-color: #e2e8f0;
				--text-color: #1e293b;
				--user-msg-bg: #f6821f;
				--body-bg: #0f172a;
			}

			body.theme-fancy {
				--app-bg: rgba(30, 41, 59, 0.7);
				--light-bg: rgba(15, 23, 42, 0.4);
				--border-color: rgba(255, 255, 255, 0.1);
				--text-color: #f8fafc;
				--assistant-msg-bg: rgba(30, 41, 59, 0.7);
			}

			body {
				font-family: -apple-system, system-ui, sans-serif;
				background: var(--body-bg);
				color: var(--text-color);
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 2rem 1rem;
				margin: 0;
			}

			/* --- LAVA LAMP RESTORED --- */
			.lava-lamp-container {
				position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
				z-index: -1; overflow: hidden;
			}
			.blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6; animation: float 15s infinite alternate ease-in-out; }
			.blob1 { width: 400px; height: 400px; background: #f6821f; top: -100px; left: -100px; }
			.blob2 { width: 500px; height: 500px; background: #d95d14; bottom: -150px; right: -100px; }
			.blob3 { width: 300px; height: 300px; background: #faad3f; top: 40%; left: 30%; }
			@keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(100px, -50px) scale(1.1); } }

			header { text-align: center; margin-bottom: 2rem; width: 100%; max-width: 800px; }
			h1 { font-size: 2.2rem; color: #fff; text-shadow: 0 2px 15px rgba(246, 130, 31, 0.6); margin-bottom: 0.2rem; }
			header p { color: #cbd5e1; font-size: 1rem; opacity: 0.8; }

			.controls-row { margin-top: 1.5rem; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; position: relative; }
			
			/* Menu Button Logic */
			.btn-secondary { 
				padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); 
				background: rgba(255,255,255,0.1); color: white; cursor: pointer; 
				display: flex; align-items: center; gap: 8px; backdrop-filter: blur(5px);
			}
			.btn-primary { padding: 8px 16px; border-radius: 8px; border: none; background: var(--primary-color); color: white; cursor: pointer; font-weight: 600; }

			.dropdown-menu {
				position: absolute; top: 110%; left: 50%; transform: translateX(-50%);
				background: #1e293b; border: 1px solid var(--border-color); border-radius: 12px;
				min-width: 200px; display: none; flex-direction: column; z-index: 3000; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
			}
			.dropdown-menu.show { display: flex; }
			.menu-item { padding: 12px 16px; color: white; display: flex; align-items: center; gap: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
			.menu-item:hover { background: var(--primary-color); }

			/* --- CHAT CONTAINER RESTORED --- */
			.chat-container {
				width: 100%; max-width: 800px; height: calc(100vh - 300px); 
				background: var(--app-bg); border-radius: 20px; overflow: hidden;
				border: 1px solid var(--border-color); backdrop-filter: blur(15px);
				display: flex; flex-direction: column;
			}

			#chat-messages { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }

			.message-input { padding: 1.5rem; background: rgba(15, 23, 42, 0.2); border-top: 1px solid var(--border-color); }
			.input-row { display: flex; gap: 12px; align-items: center; }
			
			#user-input {
				flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);
				border-radius: 12px; padding: 12px; color: white; font-family: inherit; resize: none;
			}
			
			#send-button { background: var(--primary-color); border: none; border-radius: 50%; width: 45px; height: 45px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
		</style>
	</head>
	<body class="theme-fancy">
		<div class="lava-lamp-container">
			<div class="blob blob1"></div>
			<div class="blob blob2"></div>
			<div class="blob blob3"></div>
		</div>

		<header>
			<h1>Jolene</h1>
			<p>Your Personal AI Agent</p>
			
			<div class="controls-row">
				<div style="position: relative;">
					<button class="btn-secondary" onclick="toggleMenu()"><i class="ph ph-list"></i> Settings</button>
					<div id="settings-menu" class="dropdown-menu">
						<div class="menu-item" onclick="toggleHelp()"><i class="ph ph-question"></i> Help & Tips</div>
						<div class="menu-item" onclick="toggleTheme()"><i class="ph ph-magic-wand"></i> Switch Theme</div>
						<div class="menu-item" onclick="toggleSidebar()"><i class="ph ph-database"></i> Memory Sidebar</div>
						<div class="menu-item">
							<select id="model-selector" style="background:transparent; border:none; color:white; width:100%;">
								<option value="@cf/meta/llama-3.2-11b-vision-instruct">Llama 3.2 Vision</option>
								<option value="@cf/meta/llama-3.1-8b-instruct">Llama 3.1 (8B)</option>
							</select>
						</div>
					</div>
				</div>

				<button class="btn-secondary" onclick="clearScreen()"><i class="ph ph-trash"></i> Clear Screen</button>
				<button class="btn-primary" onclick="newChat()"><i class="ph ph-chat-circle-dots"></i> New Chat</button>
			</div>
		</header>

		<div class="chat-container">
			<div id="chat-messages">
				<div class="message assistant-message">
					<div class="message-content">
						<p>Hi there! I'm Jolene. I'm here to help you brainstorm, analyze files, or even generate some art. What's on your mind today?</p>
					</div>
				</div>
			</div>

			<div class="message-input">
				<div style="display: flex; gap: 10px; margin-bottom: 10px;">
					<input type="file" id="file-input" style="color: #cbd5e1; font-size: 0.8rem;" />
					<button id="memorize-file-btn" class="btn-secondary" onclick="memorizeFile()" style="font-size: 0.8rem; padding: 4px 10px;">
						<i class="ph ph-paperclip"></i> Memorize File
					</button>
				</div>
				<div class="input-row">
					<textarea id="user-input" placeholder="Message Jolene..." rows="1"></textarea>
					<button id="send-button" onclick="sendMessage()"><i class="ph-fill ph-paper-plane-right"></i></button>
				</div>
			</div>
		</div>

		<div id="memory-sidebar" class="sidebar">...</div>
		<div id="helpModal" class="modal-overlay">...</div>

		<script src="chat.js"></script>
		<script>
			function toggleMenu() { document.getElementById('settings-menu').classList.toggle('show'); }
			window.onclick = function(e) { if (!e.target.matches('.btn-secondary') && !e.target.matches('.ph-list')) {
				var dropdowns = document.getElementsByClassName("dropdown-menu");
				for (var i = 0; i < dropdowns.length; i++) { if (dropdowns[i].classList.contains('show')) dropdowns[i].classList.remove('show'); }
			}}
		</script>
	</body>
</html>
