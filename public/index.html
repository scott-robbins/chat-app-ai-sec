<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>LLM Chat App</title>
		<style>
			:root {
				/* Plain Theme Variables (Default) */
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--primary-light: rgba(246, 130, 31, 0.1);
				--light-bg: #f4f6f8;
				--app-bg: #ffffff;
				--border-color: #e2e8f0;
				--text-color: #1e293b;
				--text-light: #64748b;
				--user-msg-bg: #f6821f;
				--user-msg-text: #ffffff;
				--assistant-msg-bg: #ffffff;
				--body-bg: linear-gradient(135deg, #fffaf5 0%, #f4f6f8 100%);
			}

			/* ==========================================
			   FANCY THEME OVERRIDES (Dark Mode + Glass)
			   ========================================== */
			body.theme-fancy {
				--app-bg: rgba(30, 41, 59, 0.6); /* Translucent dark for glass effect */
				--light-bg: rgba(15, 23, 42, 0.4);
				--border-color: rgba(255, 255, 255, 0.1);
				--text-color: #f8fafc;
				--text-light: #cbd5e1;
				--assistant-msg-bg: rgba(30, 41, 59, 0.7);
				--body-bg: #0f172a; /* Solid dark base behind lava lamps */
			}

			body.theme-fancy .chat-container {
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				border: 1px solid rgba(255, 255, 255, 0.15);
				box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
			}

			body.theme-fancy #user-input {
				background-color: rgba(15, 23, 42, 0.5);
				color: white;
			}

			body.theme-fancy header h1 {
				color: #ffffff;
				text-shadow: 0 2px 10px rgba(246, 130, 31, 0.5);
			}

			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				background: var(--body-bg);
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 2rem 1rem;
				transition: background 0.5s ease, color 0.5s ease;
			}

			/* ==========================================
			   LAVA LAMP ANIMATION CSS
			   ========================================== */
			.lava-lamp-container {
				position: fixed;
				top: 0;
				left: 0;
				width: 100vw;
				height: 100vh;
				z-index: -1;
				overflow: hidden;
				display: none; /* Hidden by default */
			}

			body.theme-fancy .lava-lamp-container {
				display: block; /* Only show when fancy theme is active */
			}

			.blob {
				position: absolute;
				border-radius: 50%;
				filter: blur(80px); /* Creates the liquid lava look */
				opacity: 0.6;
				animation: float 15s infinite alternate ease-in-out;
			}

			.blob1 {
				width: 400px; height: 400px;
				background: #f6821f; /* Cloudflare Orange */
				top: -100px; left: -100px;
				animation-duration: 18s;
			}

			.blob2 {
				width: 500px; height: 500px;
				background: #d95d14; /* Deep Orange */
				bottom: -150px; right: -100px;
				animation-duration: 22s;
				animation-delay: 2s;
			}

			.blob3 {
				width: 300px; height: 300px;
				background: #faad3f; /* Light Orange/Yellow */
				top: 40%; left: 30%;
				animation-duration: 25s;
				animation-delay: 5s;
			}

			@keyframes float {
				0% { transform: translate(0, 0) scale(1); }
				33% { transform: translate(150px, 100px) scale(1.1); }
				66% { transform: translate(-50px, 200px) scale(0.9); }
				100% { transform: translate(100px, -50px) scale(1.2); }
			}

			/* ==========================================
			   CORE UI STYLES
			   ========================================== */
			header {
				text-align: center;
				margin-bottom: 2rem;
				width: 100%;
				max-width: 800px;
			}

			h1 {
				font-size: 1.75rem;
				color: var(--primary-color);
				font-weight: 700;
				letter-spacing: -0.5px;
				transition: color 0.3s ease;
			}

			header p {
				color: var(--text-light);
				font-size: 0.95rem;
				margin-top: 0.25rem;
			}

			.chat-container {
				display: flex;
				flex-direction: column;
				width: 100%;
				max-width: 800px;
				height: calc(100vh - 220px);
				min-height: 500px;
				background-color: var(--app-bg);
				border-radius: 16px;
				box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
				overflow: hidden;
				border: 1px solid var(--border-color);
				transition: all 0.5s ease;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1.5rem;
				background-color: var(--light-bg);
				display: flex;
				flex-direction: column;
				gap: 1rem;
				transition: background-color 0.5s ease;
			}

			.message {
				padding: 0.85rem 1.2rem;
				max-width: 80%;
				box-shadow: 0 2px 5px rgba(0,0,0,0.02);
				font-size: 0.95rem;
				line-height: 1.5;
			}

			.message p {
				white-space: pre-line;
				margin: 0;
				overflow-wrap: anywhere;
			}

			.user-message {
				background-color: var(--user-msg-bg);
				color: var(--user-msg-text);
				align-self: flex-end;
				border-radius: 18px 18px 4px 18px;
			}

			.assistant-message {
				background-color: var(--assistant-msg-bg);
				color: var(--text-color);
				align-self: flex-start;
				border-radius: 18px 18px 18px 4px;
				border: 1px solid var(--border-color);
				transition: all 0.5s ease;
			}

			.message-input {
				display: flex;
				padding: 1rem;
				background-color: var(--app-bg);
				border-top: 1px solid var(--border-color);
				align-items: flex-end;
				gap: 0.75rem;
				transition: background-color 0.5s ease;
			}

			#user-input {
				flex: 1;
				padding: 0.85rem 1rem;
				border: 1px solid var(--border-color);
				border-radius: 12px;
				font-family: inherit;
				font-size: 0.95rem;
				resize: none;
				min-height: 50px;
				max-height: 150px;
				background-color: var(--app-bg);
				transition: all 0.2s ease;
			}

			#user-input:focus {
				outline: none;
				border-color: var(--primary-color);
				box-shadow: 0 0 0 4px var(--primary-light);
			}

			#send-button {
				padding: 0 1.5rem;
				height: 50px;
				background-color: var(--primary-color);
				color: white;
				border: none;
				border-radius: 12px;
				font-weight: 600;
				font-size: 0.95rem;
				cursor: pointer;
				transition: all 0.2s ease;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			#send-button:hover:not(:disabled) {
				background-color: var(--primary-hover);
				transform: translateY(-1px);
			}

			#send-button:disabled {
				background-color: var(--border-color);
				color: var(--text-light);
				cursor: not-allowed;
			}

			/* Animated Typing Indicator */
			.typing-indicator {
				display: none;
				align-self: flex-start;
				background-color: var(--assistant-msg-bg);
				border: 1px solid var(--border-color);
				border-radius: 18px 18px 18px 4px;
				padding: 1rem 1.2rem;
				margin-bottom: 1rem;
				box-shadow: 0 2px 5px rgba(0,0,0,0.02);
			}

			.typing-indicator.visible {
				display: flex;
				gap: 4px;
				align-items: center;
			}

			.typing-indicator span {
				width: 6px;
				height: 6px;
				background-color: var(--primary-color);
				border-radius: 50%;
				animation: bounce 1.4s infinite ease-in-out both;
			}

			.typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
			.typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
			.typing-indicator span:nth-child(3) { animation-delay: 0s; }

			@keyframes bounce {
				0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
				40% { transform: scale(1); opacity: 1; }
			}

			footer {
				margin-top: 2rem;
				text-align: center;
				font-size: 0.85rem;
				color: var(--text-light);
				width: 100%;
			}

			.controls-row {
				margin-top: 1rem; 
				display: flex; 
				justify-content: center; 
				gap: 10px;
				flex-wrap: wrap;
			}
			
			.btn-secondary {
				padding: 6px 12px; 
				border-radius: 6px; 
				border: 1px solid var(--border-color); 
				background: var(--app-bg); 
				cursor: pointer; 
				color: var(--text-color);
				transition: all 0.3s ease;
			}
		</style>
	</head>
	<body>
		<div class="lava-lamp-container">
			<div class="blob blob1"></div>
			<div class="blob blob2"></div>
			<div class="blob blob3"></div>
		</div>

		<header>
			<h1>Cloudflare AI Chat</h1>
			<p>Powered by Cloudflare Workers AI</p>
			
			<div class="controls-row">
				<button id="theme-toggle-btn" class="btn-secondary">✨ Toggle Theme</button>
				<button id="clear-screen-btn" class="btn-secondary">Clear Screen</button>
				<button id="new-chat-btn" style="padding: 6px 12px; border-radius: 6px; border: none; background: var(--primary-color); color: white; cursor: pointer;">New Chat</button>
			</div>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<p>Hello! I'm an LLM chat app powered by Cloudflare Workers AI. How can I help you today?</p>
				</div>
				
				<div class="typing-indicator" id="typing-indicator">
					<span></span>
					<span></span>
					<span></span>
				</div>
			</div>

			<div class="message-input" style="flex-wrap: wrap;">
				<div style="width: 100%; margin-bottom: 10px; display: flex; gap: 10px;">
					<input type="file" id="file-upload" accept=".txt,.md" style="font-size: 0.85rem; color: var(--text-color);" />
					<button id="upload-btn" class="btn-secondary">Memorize File</button>
				</div>
				<textarea
					id="user-input"
					placeholder="Message AI Assistant..."
					rows="1"
					autofocus
				></textarea>
				<button id="send-button">Send</button>
			</div>
		</div>

		<footer>
			<p>Cloudflare Workers AI Chat Template &copy; 2026</p>
		</footer>

		<script src="chat.js"></script>
	</body>
</html>
