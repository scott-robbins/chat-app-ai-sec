<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Jolene AI</title>
		
		<script src="https://unpkg.com/@phosphor-icons/web"></script>
		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
		<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
		<link rel="stylesheet" href="style.css">

		<style>
			/* --- CLEAN HEADER STYLES --- */
			header {
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: 1rem 2rem;
				width: 100%;
				max-width: 900px;
				margin-bottom: 1rem;
			}

			.brand-container { position: relative; cursor: pointer; }
			.brand-container h1 { font-size: 1.5rem; color: #fff; margin: 0; }
			
			/* Dropdown Menu Styling */
			.dropdown-menu {
				position: absolute; top: 100%; left: 0; background: var(--app-bg);
				border: 1px solid var(--border-color); border-radius: 12px;
				min-width: 200px; display: none; flex-direction: column;
				box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 3000; margin-top: 10px;
			}
			.dropdown-menu.show { display: flex; }
			.menu-item {
				padding: 12px 16px; color: var(--text-color); text-decoration: none;
				display: flex; align-items: center; gap: 10px; transition: background 0.2s;
			}
			.menu-item:hover { background: var(--primary-light); color: var(--primary-color); }

			.icon-actions { display: flex; gap: 12px; align-items: center; }
			.icon-btn {
				background: none; border: none; color: var(--text-light);
				font-size: 1.4rem; cursor: pointer; transition: color 0.2s;
				display: flex; align-items: center; justify-content: center;
			}
			.icon-btn:hover { color: var(--primary-color); }

			/* Clean Input Area */
			.input-wrapper {
				display: flex; align-items: center; gap: 12px; width: 100%;
				background: var(--light-bg); border-radius: 24px; padding: 8px 16px;
				border: 1px solid var(--border-color);
			}
			#user-input {
				background: transparent !important; border: none !important;
				outline: none; box-shadow: none !important; padding: 8px 0;
			}
		</style>
	</head>
	<body class="theme-fancy">
		<div class="lava-lamp-container">
			<div class="blob blob1"></div>
			<div class="blob blob2"></div>
			<div class="blob blob3"></div>
		</div>

		<header>
			<div class="brand-container" onclick="toggleMenu()">
				<h1>Jolene <i class="ph ph-caret-down" style="font-size: 0.8rem;"></i></h1>
				<div id="app-menu" class="dropdown-menu">
					<div class="menu-item" onclick="toggleSidebar()"><i class="ph ph-database"></i> Memory & Files</div>
					<div class="menu-item" onclick="toggleTheme()"><i class="ph ph-magic-wand"></i> Switch Theme</div>
					<div class="menu-item">
						<select id="model-selector" style="background:transparent; border:none; color:inherit; font-size:inherit; width:100%;">
							<option value="@cf/meta/llama-3.2-11b-vision-instruct">Llama 3.2 Vision</option>
							<option value="@cf/meta/llama-3.1-8b-instruct">Llama 3.1 (8B)</option>
						</select>
					</div>
				</div>
			</div>

			<div class="icon-actions">
				<button class="icon-btn" onclick="toggleHelp()" title="Help"><i class="ph ph-question"></i></button>
				<button class="icon-btn" onclick="clearScreen()" title="Clear Screen"><i class="ph ph-trash"></i></button>
				<button class="icon-btn" onclick="newChat()" style="color: var(--primary-color);" title="New Chat"><i class="ph ph-plus-circle"></i></button>
			</div>
		</header>

		<div class="chat-container">
			<div id="chat-messages">
				</div>

			<div class="message-input" style="border:none; padding: 1.5rem;">
				<div class="input-wrapper">
					<label for="file-input" class="icon-btn" title="Upload File">
						<i class="ph ph-paperclip"></i>
					</label>
					<input type="file" id="file-input" style="display:none;" onchange="handleFileSelect()">
					
					<textarea id="user-input" placeholder="Message Jolene..." rows="1"></textarea>
					
					<button id="send-button" class="icon-btn" style="color: var(--primary-color);">
						<i class="ph-fill ph-paper-plane-right"></i>
					</button>
				</div>
				<div id="file-status" style="font-size: 0.7rem; color: var(--primary-color); margin-top: 5px; display: none;"></div>
			</div>
		</div>

		<script src="chat.js"></script>
		<script>
			function toggleMenu() {
				document.getElementById('app-menu').classList.toggle('show');
			}
			// Close menu when clicking away
			window.addEventListener('click', function(e) {
				if (!document.querySelector('.brand-container').contains(e.target)) {
					document.getElementById('app-menu').classList.remove('show');
				}
			});
		</script>
	</body>
</html>
