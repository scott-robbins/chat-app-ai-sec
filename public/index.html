<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Jolene AI</title>
		
		<script src="https://unpkg.com/@phosphor-icons/web"></script>
		<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
		<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--primary-light: rgba(246, 130, 31, 0.1);
				--light-bg: #f4f6f8;
				--app-bg: #ffffff;
				--border-color: #e2e8f0;
				--text-color: #1e293b;
				--text-light: #64748b;
				--user-msg-bg: #f6821f;
				--user-msg-text: #ffffff;
				--assistant-msg-bg: #ffffff;
				--body-bg: linear-gradient(135deg, #fffaf5 0%, #f4f6f8 100%);
			}

			body.theme-fancy {
				--app-bg: rgba(30, 41, 59, 0.6);
				--light-bg: rgba(15, 23, 42, 0.4);
				--border-color: rgba(255, 255, 255, 0.1);
				--text-color: #f8fafc;
				--text-light: #cbd5e1;
				--assistant-msg-bg: rgba(30, 41, 59, 0.7);
				--body-bg: #0f172a;
			}

			body.theme-fancy .chat-container {
				backdrop-filter: blur(16px);
				-webkit-backdrop-filter: blur(16px);
				border: 1px solid rgba(255, 255, 255, 0.15);
				box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
			}

			body.theme-fancy #user-input {
				background-color: rgba(15, 23, 42, 0.5);
				color: white;
			}

			body.theme-fancy header h1 {
				color: #ffffff;
				text-shadow: 0 2px 10px rgba(246, 130, 31, 0.5);
			}

			* { box-sizing: border-box; margin: 0; padding: 0; }

			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				background: var(--body-bg);
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 2rem 1rem;
				transition: background 0.5s ease, color 0.5s ease;
			}

			.lava-lamp-container {
				position: fixed;
				top: 0; left: 0; width: 100vw; height: 100vh;
				z-index: -1; overflow: hidden; display: none;
			}
			body.theme-fancy .lava-lamp-container { display: block; }
			.blob {
				position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6;
				animation: float 15s infinite alternate ease-in-out;
			}
			.blob1 { width: 400px; height: 400px; background: #f6821f; top: -100px; left: -100px; }
			.blob2 { width: 500px; height: 500px; background: #d95d14; bottom: -150px; right: -100px; }

			@keyframes float {
				0% { transform: translate(0, 0) scale(1); }
				100% { transform: translate(100px, -50px) scale(1.2); }
			}

			header { text-align: center; margin-bottom: 2rem; width: 100%; max-width: 800px; }
			h1 { font-size: 1.75rem; color: var(--primary-color); font-weight: 700; }
			
			.chat-container {
				display: flex; flex-direction: column; width: 100%; max-width: 800px;
				height: calc(100vh - 220px); min-height: 500px; background-color: var(--app-bg);
				border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
				overflow: hidden; border: 1px solid var(--border-color);
			}

			.chat-messages {
				flex: 1; overflow-y: auto; padding: 1.5rem; background-color: var(--light-bg);
				display: flex; flex-direction: column; gap: 1rem;
			}

			.message { padding: 0.85rem 1.2rem; max-width: 85%; border-radius: 18px; font-size: 0.95rem; }
			.user-message { background-color: var(--user-msg-bg); color: var(--user-msg-text); align-self: flex-end; border-bottom-right-radius: 4px; }
			.assistant-message { background-color: var(--assistant-msg-bg); color: var(--text-color); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }

			.message-input { display: flex; padding: 1rem; background-color: var(--app-bg); border-top: 1px solid var(--border-color); gap: 0.75rem; flex-wrap: wrap; }
			#user-input { flex: 1; padding: 0.85rem; border-radius: 12px; border: 1px solid var(--border-color); resize: none; min-height: 50px; }
			#send-button { padding: 0 1.5rem; background: var(--primary-color); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1.2rem; }

			.controls-row { margin-top: 1rem; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
			.btn-secondary { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border-color); background: var(--app-bg); cursor: pointer; color: var(--text-color); }
		</style>
	</head>
	<body>
		<div class="lava-lamp-container"><div class="blob blob1"></div><div class="blob blob2"></div></div>

		<header>
			<h1>Jolene</h1>
			<div class="controls-row">
				<select id="model-selector" class="btn-secondary">
					<option value="@cf/meta/llama-3.2-11b-vision-instruct">Llama 3.2 Vision</option>
					<option value="@cf/meta/llama-3.1-8b-instruct-fp8">Llama 3.1 (8B)</option>
				</select>

				<select id="prompt-selector" class="btn-secondary">
					<option value="You are a helpful and friendly AI assistant.">Default Assistant</option>
					<option value="You are overwhelmingly positive, enthusiastic, and highly caffeinated! Use tons of emojis and hype the user up!">Caffeinated</option>
					<option value="You are a highly intelligent but extremely sarcastic AI. Be snarky but accurate.">Sarcastic</option>
				</select>
				
				<button id="theme-toggle-btn" class="btn-secondary"><i class="ph ph-magic-wand"></i> Theme</button>
				<button id="new-chat-btn" class="btn-secondary"><i class="ph ph-chat-circle-dots"></i> New Chat</button>
			</div>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message"><p>System Ready. How can I help?</p></div>
			</div>
			<div class="message-input">
				<div style="width: 100%; display: flex; gap: 10px; margin-bottom: 5px;">
					<input type="file" id="file-upload" accept=".txt,.md,.pdf,.png,.jpg,.jpeg" />
					<button id="upload-btn" class="btn-secondary">Memorize</button>
				</div>
				<textarea id="user-input" placeholder="Type here..." rows="1"></textarea>
				<button id="send-button"><i class="ph-fill ph-paper-plane-right"></i></button>
			</div>
		</div>

		<script src="chat.js"></script>
	</body>
</html>
