<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jolene AI</title>
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        /* --- THE ORIGINAL GLASS THEME --- */
        :root {
            --primary: #f6821f;
            --glass-bg: rgba(30, 41, 59, 0.55); /* High Transparency */
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-color: #f8fafc;
            --body-bg: #0f172a;
        }

        body.theme-plain {
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-color: #1e293b;
            --glass-border: #e2e8f0;
            --body-bg: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--body-bg);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            transition: all 0.5s ease;
        }

        /* --- LAVA LAMP (Z-Index Fixed) --- */
        .lava-lamp-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; pointer-events: none;
        }
        body.theme-plain .lava-lamp-container { display: none; }
        .blob {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.6;
            animation: float 15s infinite alternate ease-in-out;
        }
        .blob1 { width: 450px; height: 450px; background: var(--primary); top: -100px; left: -100px; }
        .blob2 { width: 550px; height: 550px; background: #d95d14; bottom: -150px; right: -100px; }
        @keyframes float { 100% { transform: translate(120px, -60px) scale(1.1); } }

        header { text-align: center; margin-bottom: 2rem; width: 100%; max-width: 800px; }
        header h1 { font-size: 3.5rem; color: #fff; text-shadow: 0 0 25px rgba(246, 130, 31, 0.7); }

        /* --- STANDALONE BUTTONS (No Dropdowns) --- */
        .controls-row { display: flex; justify-content: center; gap: 10px; margin-top: 1.5rem; flex-wrap: wrap; }
        button, select {
            padding: 10px 18px; border-radius: 12px; border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1); color: white; cursor: pointer;
            font-weight: 600; display: flex; align-items: center; gap: 8px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .btn-primary { background: var(--primary); border: none; }
        body.theme-plain button { background: #eee; color: #333; }

        /* --- THE CORE GLASS CONTAINER --- */
        .chat-container {
            width: 100%; max-width: 850px; height: calc(100vh - 380px);
            background: var(--glass-bg);
            border-radius: 32px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px); /* This makes the lava lamp shine through */
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; overflow: hidden;
        }

        #chat-messages { flex: 1; overflow-y: auto; padding: 2.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
        .message-input { padding: 1.5rem 2rem; background: rgba(0,0,0,0.2); border-top: 1px solid var(--glass-border); }
        
        textarea {
            width: 100%; padding: 14px; border-radius: 14px; border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05); color: white; outline: none; resize: none; font-size: 1rem;
        }

        /* Modals & Sidebar */
        .sidebar { position: fixed; top: 0; right: -400px; width: 350px; height: 100%; background: #1e293b; border-left: 1px solid var(--glass-border); transition: 0.4s; padding: 2rem; z-index: 2000; }
        .sidebar.open { right: 0; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 3000; }

        footer { margin-top: 2rem; color: #64748b; font-size: 0.9rem; font-weight: 500; }
    </style>
</head>
<body class="theme-fancy">
    <div class="lava-lamp-container"><div class="blob blob1"></div><div class="blob blob2"></div></div>
    
    <header>
        <h1>Jolene</h1>
        <div class="controls-row">
            <button onclick="clearScreen()"><i class="ph ph-trash"></i> Clear</button>
            <button class="btn-primary" onclick="newChat()"><i class="ph ph-plus"></i> New Chat</button>
            <button onclick="toggleTheme()"><i class="ph ph-magic-wand"></i> Theme</button>
            <button onclick="openSidebar()"><i class="ph ph-database"></i> Memory</button>
            <button onclick="openHelp()"><i class="ph ph-question"></i> Help</button>
            <select id="model-selector" onchange="modelChanged()">
                <option value="@cf/meta/llama-3.2-11b-vision-instruct">Llama 3.2 Vision</option>
                <option value="@cf/meta/llama-3.1-8b-instruct">Llama 3.1 (8B)</option>
                <option value="@cf/mistral/mistral-7b-instruct-v0.1">Mistral 7B</option>
                <option value="@cf/google/gemma-7b-it">Gemma 7B</option>
            </select>
        </div>
    </header>

    <div class="chat-container">
        <div id="chat-messages">
            <div class="message assistant-message"><p>Hi there! I'm Jolene. I'm here to help you brainstorm, analyze files, or generate some art. What's on your mind today?</p></div>
        </div>
        <div class="message-input">
            <div style="display:flex; gap:10px; margin-bottom:12px; align-items:center;">
                <input type="file" id="file-input" style="color:#64748b; font-size: 0.8rem;">
                <button onclick="memorizeFile()" style="font-size: 0.8rem; padding: 5px 10px;">Memorize</button>
            </div>
            <div style="display:flex; gap:12px;">
                <textarea id="user-input" placeholder="Message Jolene..." rows="1"></textarea>
                <button onclick="sendMessage()" class="btn-primary" style="border-radius:50%; width:48px; height:48px; justify-content:center;"><i class="ph-fill ph-paper-plane-right"></i></button>
            </div>
        </div>
    </div>

    <div id="memory-sidebar" class="sidebar">
        <div style="display:flex; justify-content:space-between; color:white;"><h3>Memory</h3><button onclick="openSidebar()">&times;</button></div>
        <div id="kv-profile-display" style="color:white; margin-top:20px;">Loading profile...</div>
    </div>

    <footer>Jolene AI &copy; 2026</footer>
    <script src="chat.js"></script>
</body>
</html>
